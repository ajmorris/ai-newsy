name: Publish Web Archive

on:
  push:
    branches:
      - main
    paths:
      - 'data/digests/*.md'
      - 'execution/build_web_archive.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-web-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build archive pages and manifest
        run: python execution/build_web_archive.py

      - name: Commit and push generated archive updates
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git add frontend/issues
          if git diff --staged --quiet; then
            echo "No generated archive changes to commit."
            exit 0
          fi
          git commit -m "chore: publish web issue archive"
          git push origin "HEAD:${BRANCH_NAME}"
