name: Publish Web Archive

on:
  push:
    branches:
      - main
    paths:
      - 'data/digests/snapshots/*.sent.json'
      - 'execution/build_web_archive.py'
  workflow_run:
    workflows:
      - Daily AI Digest
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  publish-web-archive:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download digest artifacts from Daily AI Digest
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: digest-artifacts-${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: /tmp/digest-artifacts

      - name: Sync downloaded digest artifacts into repository
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          mkdir -p data/digests
          mkdir -p data/digests/snapshots
          shopt -s globstar nullglob
          files=(/tmp/digest-artifacts/**/*.json /tmp/digest-artifacts/**/*.md /tmp/digest-artifacts/**/*.sent.json)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No digest artifacts found in downloaded artifact."
            exit 1
          fi
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            if [[ "$name" == *.sent.json ]]; then
              cp "$file" "data/digests/snapshots/${name}"
            else
              cp "$file" "data/digests/${name}"
            fi
          done
          ls -1 data/digests/*.json data/digests/*.md data/digests/snapshots/*.sent.json

      - name: Build archive pages and manifest
        run: python execution/build_web_archive.py

      - name: Validate digest parity
        run: |
          latest_digest=$(ls -1 data/digests/snapshots/*.sent.json | sed -E 's|.*/||' | sed -E 's|\.sent\.json$||' | sort | tail -n 1)
          python execution/validate_digest_parity.py --digest-date "${latest_digest}" --snapshot-dir data/digests/snapshots --report parity-report.json

      - name: Validate archive manifest matches digest inputs
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          digest_files = sorted(Path("data/digests/snapshots").glob("*.sent.json"))
          if not digest_files:
              raise SystemExit("No sent snapshot files found in data/digests/snapshots.")

          dated = [p.name.replace(".sent.json", "") for p in digest_files if re.fullmatch(r"\d{4}-\d{2}-\d{2}\.sent\.json", p.name)]
          expected_latest = max(dated) if dated else digest_files[-1].name.replace(".sent.json", "")
          expected_count = len(digest_files)

          manifest_path = Path("frontend/issues/index.json")
          if not manifest_path.exists():
              raise SystemExit("Archive manifest missing: frontend/issues/index.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          actual_count = int(manifest.get("issueCount", -1))
          latest_issue = manifest.get("latestIssue") or {}
          actual_latest = str(latest_issue.get("digestDate", ""))

          print(f"Expected digest count: {expected_count} | Manifest issueCount: {actual_count}")
          print(f"Expected latest digest date: {expected_latest} | Manifest latestIssue: {actual_latest}")

          if actual_count != expected_count:
              raise SystemExit("Manifest issueCount does not match digest markdown file count.")
          if actual_latest != expected_latest:
              raise SystemExit("Manifest latestIssue.digestDate does not match latest digest markdown date.")
          PY

      - name: Commit and push generated archive updates
        env:
          BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          git add frontend/issues
          if git diff --staged --quiet; then
            echo "No generated archive changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: publish web issue archive"
          git push origin "HEAD:${BRANCH_NAME}"
