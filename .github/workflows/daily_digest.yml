# Daily AI Digest Workflow
# Runs daily at 8:00 AM America/New_York with DST-safe UTC candidates.

name: Daily AI Digest

on:
  schedule:
    # 8:00 AM America/New_York (covers EST and EDT candidate UTC slots)
    - cron: '0 13 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: "Allow manual production send (bypasses duplicate-send guard)"
        required: false
        type: boolean
        default: false
      send_reason:
        description: "Reason for manual production send override"
        required: false
        type: string

concurrency:
  group: daily-ai-digest-schedule
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Guard scheduled run to 8:00 AM America/New_York (with tolerance)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          ny_time=$(TZ=America/New_York date +'%H:%M')
          echo "Current America/New_York time: ${ny_time}"
          if [[ "${ny_time}" < "08:00" || "${ny_time}" > "08:05" ]]; then
            echo "Outside target local time; exiting successfully."
            exit 0
          fi

      - name: Guard manual production send
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.force_send }}
        run: |
          echo "Manual run blocked unless force_send=true."
          echo "Re-run workflow with force_send=true and send_reason."
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: emails/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci --prefix emails

      - name: Send daily email digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_INTRO: ${{ vars.PROMPT_INTRO }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python execution/digest_payload.py
          python execution/build_digest_markdown.py
          FORCE_SEND_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_send }}" = "true" ]; then
            FORCE_SEND_FLAG="--force-send"
          fi
          SEND_REASON="${{ inputs.send_reason || '' }}"
          python execution/send_daily_email.py ${FORCE_SEND_FLAG} --send-reason "${SEND_REASON}"

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: digest-artifacts-${{ github.run_id }}
          path: |
            data/digests/*.md
            data/digests/*.json
            data/digests/snapshots/*.sent.json
          if-no-files-found: error
