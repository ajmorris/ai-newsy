# Daily AI Digest Workflow
# Runs once daily at a fixed UTC time (09:00).

name: Daily AI Digest

on:
  schedule:
    # Runs 20 minutes after archive publish (08:40 UTC).
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: "Allow manual production send (bypasses duplicate-send guard)"
        required: false
        type: boolean
        default: false
      send_reason:
        description: "Reason for manual production send override"
        required: false
        type: string

concurrency:
  group: daily-ai-digest-schedule
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      # Decide once whether this run should proceed past setup. Setting an output
      # (instead of `exit 0`) lets every later step gate on `steps.guard.outputs.should_send`,
      # so an out-of-window cron trigger or a manual run without force_send no longer
      # leaks through to the actual send. The DB claim in send_daily_email.py is the
      # second, durable layer that catches anything this guard misses.
      - name: Guard run (time window + manual override)
        id: guard
        run: |
          should_send="false"
          reason=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            should_send="true"
            reason="Scheduled run at fixed UTC cadence."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_send }}" = "true" ]; then
              should_send="true"
            else
              reason="Manual run blocked unless force_send=true."
            fi
          else
            reason="Unsupported event: ${{ github.event_name }}."
          fi

          if [ "${should_send}" = "true" ]; then
            echo "Guard: proceeding with send. Reason: ${reason}"
          else
            echo "Guard: skipping later steps. Reason: ${reason}"
          fi
          echo "should_send=${should_send}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: emails/package-lock.json

      - name: Install dependencies
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci --prefix emails

      - name: Validate email link origin env
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "APP_URL secret is required for confirmation/unsubscribe links."
            exit 1
          fi
          if [ "${APP_URL}" = "https://your-app.vercel.app" ]; then
            echo "APP_URL secret is still set to placeholder value."
            exit 1
          fi

      - name: Send daily email digest
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_INTRO: ${{ vars.PROMPT_INTRO }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python execution/digest_payload.py
          python execution/build_digest_markdown.py
          FORCE_SEND_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_send }}" = "true" ]; then
            FORCE_SEND_FLAG="--force-send"
          fi
          SEND_REASON="${{ inputs.send_reason || '' }}"
          python execution/send_daily_email.py ${FORCE_SEND_FLAG} --send-reason "${SEND_REASON}"

      - name: Verify scheduled run produced today's sent snapshot
        if: ${{ github.event_name == 'schedule' && steps.guard.outputs.should_send == 'true' }}
        run: |
          expected_snapshot="data/digests/snapshots/$(date -u +%F).sent.json"
          echo "Checking for expected snapshot: ${expected_snapshot}"
          if [ ! -f "${expected_snapshot}" ]; then
            echo "Missing scheduled snapshot for today."
            ls -la data/digests/snapshots || true
            exit 1
          fi

      - name: Upload digest artifacts
        if: ${{ steps.guard.outputs.should_send == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-artifacts-${{ github.run_id }}
          path: |
            data/digests/*.md
            data/digests/*.json
            data/digests/snapshots/*.sent.json
            data/digests/snapshots/*.status.json
          if-no-files-found: error
