name: Rebuild Digest Markdown

on:
  workflow_dispatch:
    inputs:
      digest_date:
        description: "Digest date override (YYYY-MM-DD, optional)"
        required: false
        type: string
      window_hours:
        description: "Article lookback window in hours"
        required: false
        default: "24"
        type: string

permissions:
  contents: write

jobs:
  rebuild-digest-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build digest markdown only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_INTRO: ${{ vars.PROMPT_INTRO }}
        run: |
          digest_date_input="${{ github.event.inputs.digest_date }}"
          window_hours_input="${{ github.event.inputs.window_hours }}"
          if [ -n "${digest_date_input}" ]; then
            python execution/build_digest_markdown.py --digest-date "${digest_date_input}" --window-hours "${window_hours_input}"
          else
            python execution/build_digest_markdown.py --window-hours "${window_hours_input}"
          fi

      - name: Upload digest markdown artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-digest-markdown-${{ github.run_id }}
          path: data/digests/*.md
          if-no-files-found: error

      - name: Commit and push digest markdown
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git add data/digests
          if git diff --staged --quiet; then
            echo "No digest markdown changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: rebuild digest markdown"
          git push origin "HEAD:${BRANCH_NAME}"
