# Manual test workflow: send a single-recipient digest to verify
# that GitHub Actions, secrets/vars, and the email pipeline are wired up
# correctly without touching the real subscriber list.
#
# Trigger from: GitHub → Actions → "Test Digest (Single User)" → Run workflow
# Inputs:
#   test_email       (required) recipient for the test digest
#   prepare_content  (optional, default false) run the full fetch/topic/
#                    summarize/twitter-headline/community-headline prep pipeline before sending.
#                    Leave unchecked to exercise only the email send path
#                    using whatever articles/headlines are already in the DB.
#
# Safety: send_daily_email.py --test-email does NOT call mark_articles_sent,
# so articles stay available for the real daily digest run.

name: Test Digest (Single User)

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Email address to send the test digest to'
        required: true
        type: string
      prepare_content:
        description: 'Run content prep (fetch RSS, assign topics, summarize, Twitter + Reddit/HN/YC headlines) before sending'
        required: false
        type: boolean
        default: false

jobs:
  send-test-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch AI News from RSS
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python execution/fetch_ai_news.py --limit 10

      - name: Assign topics to new articles
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_TOPIC: ${{ vars.PROMPT_TOPIC }}
        run: python execution/assign_topics.py

      - name: Summarize articles
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_SUMMARIZE: ${{ vars.PROMPT_SUMMARIZE }}
        run: python execution/summarize_articles.py

      - name: Generate tweet headlines
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TWEETS_DATABASE_ID: ${{ secrets.NOTION_TWEETS_DATABASE_ID }}
          TWEET_LOOKBACK_HOURS: ${{ vars.TWEET_LOOKBACK_HOURS || '24' }}
          TWEET_FETCH_LIMIT: ${{ vars.TWEET_FETCH_LIMIT || '100' }}
          TWEET_MAX_HEADLINES: ${{ vars.TWEET_MAX_HEADLINES || '12' }}
          TWEET_HEADLINES_MODEL: ${{ vars.TWEET_HEADLINES_MODEL || 'gemini-2.0-flash' }}
          TWEET_MIN_LEARNING_SCORE: ${{ vars.TWEET_MIN_LEARNING_SCORE || '2' }}
          TWEET_THEME_SIMILARITY_THRESHOLD: ${{ vars.TWEET_THEME_SIMILARITY_THRESHOLD || '0.38' }}
          TWEET_MAX_PER_THEME: ${{ vars.TWEET_MAX_PER_THEME || '2' }}
          TWEET_DISTINCTNESS_THRESHOLD: ${{ vars.TWEET_DISTINCTNESS_THRESHOLD || '0.45' }}
        run: python execution/generate_tweet_headlines.py

      - name: Generate Reddit/HN/YC headlines
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          COMMUNITY_LOOKBACK_HOURS: ${{ vars.COMMUNITY_LOOKBACK_HOURS || '24' }}
          COMMUNITY_FETCH_LIMIT: ${{ vars.COMMUNITY_FETCH_LIMIT || '120' }}
          COMMUNITY_MAX_HEADLINES: ${{ vars.COMMUNITY_MAX_HEADLINES || '12' }}
          COMMUNITY_HEADLINES_MODEL: ${{ vars.COMMUNITY_HEADLINES_MODEL || 'gemini-2.0-flash' }}
          COMMUNITY_MIN_LEARNING_SCORE: ${{ vars.COMMUNITY_MIN_LEARNING_SCORE || '2' }}
          COMMUNITY_THEME_SIMILARITY_THRESHOLD: ${{ vars.COMMUNITY_THEME_SIMILARITY_THRESHOLD || '0.38' }}
          COMMUNITY_MAX_PER_THEME: ${{ vars.COMMUNITY_MAX_PER_THEME || '2' }}
          COMMUNITY_DISTINCTNESS_THRESHOLD: ${{ vars.COMMUNITY_DISTINCTNESS_THRESHOLD || '0.45' }}
          COMMUNITY_SUBREDDITS: ${{ vars.COMMUNITY_SUBREDDITS || 'MachineLearning,artificial,LocalLLaMA,OpenAI,singularity' }}
          REDDIT_USER_AGENT: ${{ vars.REDDIT_USER_AGENT || 'ai-newsy-digest/1.0 (+https://github.com/ajmorris/ai-newsy)' }}
          YC_RSS_URL: ${{ vars.YC_RSS_URL || 'https://www.ycombinator.com/blog/feed' }}
        run: python execution/generate_community_headlines.py

      - name: Verify tweet headlines persisted for digest date
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python - <<'PY'
          from datetime import datetime
          from execution.database import get_digest_extra

          digest_date = datetime.utcnow().date().isoformat()
          extra = get_digest_extra(digest_date=digest_date, key="tweet_headlines")
          if not extra:
              raise SystemExit(f"tweet_headlines missing for digest date {digest_date}")

          payload = extra.get("payload") if isinstance(extra, dict) else None
          if not isinstance(payload, dict):
              raise SystemExit(f"tweet_headlines payload invalid for digest date {digest_date}")

          headline_count = len(payload.get("headlines", []) or [])
          source_count = payload.get("source_count", 0)
          print(
              f"tweet_headlines present for {digest_date}: "
              f"source_count={source_count}, headline_count={headline_count}"
          )
          PY

      - name: Verify community headlines persisted for digest date
        if: ${{ inputs.prepare_content }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python - <<'PY'
          from datetime import datetime
          from execution.database import get_digest_extra

          digest_date = datetime.utcnow().date().isoformat()
          extra = get_digest_extra(digest_date=digest_date, key="community_headlines")
          if not extra:
              raise SystemExit(f"community_headlines missing for digest date {digest_date}")

          payload = extra.get("payload") if isinstance(extra, dict) else None
          if not isinstance(payload, dict):
              raise SystemExit(f"community_headlines payload invalid for digest date {digest_date}")

          headline_count = len(payload.get("headlines", []) or [])
          source_count = payload.get("source_count", 0)
          print(
              f"community_headlines present for {digest_date}: "
              f"source_count={source_count}, headline_count={headline_count}"
          )
          PY

      - name: Send test digest to single recipient
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_INTRO: ${{ vars.PROMPT_INTRO }}
        run: python execution/send_daily_email.py --test-email "${{ inputs.test_email }}"
