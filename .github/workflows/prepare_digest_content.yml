name: Prepare RSS Content

on:
  schedule:
    # 2:00 AM America/New_York (covers EST and EDT candidate UTC slots)
    - cron: '0 7 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prepare-rss-content-schedule
  cancel-in-progress: false

jobs:
  prepare-content:
    runs-on: ubuntu-latest

    steps:
      - name: Guard scheduled run to 2:00 AM America/New_York
        if: ${{ github.event_name == 'schedule' }}
        run: |
          ny_time=$(TZ=America/New_York date +'%H:%M')
          echo "Current America/New_York time: ${ny_time}"
          if [ "${ny_time}" != "02:00" ]; then
            echo "Outside target local time; exiting successfully."
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch AI News from RSS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python execution/fetch_ai_news.py --limit 10

      - name: Single-pass analyze new articles
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_SINGLE_PASS_ANALYSIS: ${{ vars.PROMPT_SINGLE_PASS_ANALYSIS }}
          SINGLE_PASS_MODEL: ${{ vars.SINGLE_PASS_MODEL || 'gemini-2.0-flash' }}
          SINGLE_PASS_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
        run: python execution/analyze_articles_single_pass.py

      - name: Generate tweet headlines and persist
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TWEETS_DATABASE_ID: ${{ secrets.NOTION_TWEETS_DATABASE_ID }}
        run: python execution/generate_tweet_headlines.py

      - name: Generate community headlines and persist
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
        run: python execution/generate_community_headlines.py

      - name: Verify RSS summaries available for digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta
          from execution.database import get_unsent_articles, get_articles_without_analysis

          since = datetime.utcnow() - timedelta(hours=24)
          rows = get_unsent_articles(topic=None, require_summary=True, since=since, until=None)
          pending = get_articles_without_analysis()
          print(f"rss verification: summarized_unsent_last_24h={len(rows)}")
          print(f"rss verification: pending_single_pass_articles={len(pending)}")
          PY

      - name: Build canonical digest payload JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-6' }}
          PROMPT_INTRO: ${{ vars.PROMPT_INTRO }}
        run: python execution/digest_payload.py

      - name: Commit canonical digest payload updates
        run: |
          git add data/digests/*.json
          if git diff --staged --quiet; then
            echo "No canonical digest JSON changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: persist canonical digest payload"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Upload prepare-step digest markdown artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prepare-digest-markdown-${{ github.run_id }}
          path: |
            data/digests/*.md
            data/digests/*.json
          if-no-files-found: ignore
