<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Daily Archive</title>
  <style>
    :root {
      --bg: #0b0b0c;
      --bg-raised: #121214;
      --card: #17171a;
      --line: #26262b;
      --line-soft: #1d1d21;
      --fg: #f4f3ef;
      --muted: #a3a099;
      --dim: #6b6a65;
      --brand: #39ff88;
      --brand-ink: #0b0b0c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 36px 20px 56px;
    }
    h1 { margin: 0 0 8px; font-size: 56px; line-height: 1; letter-spacing: -2px; }
    p { margin: 0 0 20px; color: var(--muted); }
    .back-link {
      color: var(--brand);
      text-decoration: none;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
    }
    .cta {
      margin: 0 0 24px;
      padding: 16px;
      border-radius: 4px;
      border: 1px solid var(--line);
      background: var(--bg-raised);
    }
    .cta a {
      color: var(--brand);
      font-weight: 600;
      text-decoration: none;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
    }
    li {
      display: grid;
      grid-template-columns: 100px 110px 1fr 90px 20px;
      gap: 12px;
      align-items: center;
      padding: 16px 16px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--card);
    }
    li:last-child { border-bottom: 0; }
    a { color: var(--fg); text-decoration: none; font-weight: 600; }
    span { color: var(--dim); font-size: 12px; font-family: "JetBrains Mono", ui-monospace, monospace; text-transform: uppercase; letter-spacing: 1px; }
    .issue-id, .issue-date { color: var(--dim); }
    .chev { text-align: right; color: var(--muted); }
    @media (max-width: 640px) {
      h1 { font-size: 32px; letter-spacing: -1.2px; }
      li { grid-template-columns: 74px 1fr 20px; }
      .issue-date, li span:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="/">← Back to home</a>
    <h1>Recent editions.</h1>
    <p>Browse every published issue.</p>
    <div class="cta">
      Prefer this in your inbox? <a href="/#subscribe-form">Subscribe to AI Newsy</a>.
    </div>
    <ul>
      <li><span class="issue-id">#2</span><span class="issue-date">Apr 22, 2026</span><a href="2026-04-22.html">ISSUE 2 · 39 STORIES · 11 MIN READ</a><span>39 stories</span><span class="chev">→</span></li>
<li><span class="issue-id">#1</span><span class="issue-date">Apr 21, 2026</span><a href="2026-04-21.html">ISSUE 1 · 15 STORIES · 11 MIN READ</a><span>15 stories</span><span class="chev">→</span></li>
    </ul>
  </main>
</body>
</html>
